# Configuración del analizador de Dart/Flutter.
# Linter estricto: el CI falla si hay avisos. Ver docs/arquitectura/vision-general.md
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Tratar los avisos importantes como errores en el CI.
    invalid_annotation_target: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - require_trailing_commas
    - sort_child_properties_last
    - unawaited_futures
    - use_super_parameters
