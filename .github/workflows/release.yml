name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  android:
    name: APK Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK (release sin firma)
        run: flutter build apk --release

      - name: Subir APK a la Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS (sin firma)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build iOS (sin codesign)
        run: flutter build ios --release --no-codesign

      - name: Comprimir build iOS
        run: |
          cd build/ios/iphoneos
          zip -r ../../../blackjack-ios-unsigned.zip Runner.app

      - name: Subir build iOS a la Release
        uses: softprops/action-gh-release@v2
        with:
          files: blackjack-ios-unsigned.zip
          body: |
            > **iOS sin firma:** requiere cuenta Apple Developer (US$99/año) para instalar en
            > dispositivo real o publicar en App Store. El artefacto valida que el código compila.
