name: Release

on:
  push:
    tags:
      - "v*"

# Para que softprops/action-gh-release pueda crear la Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android:
    name: APK + AAB Android (firmados)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      # Versión dinámica: el versionName sale del tag (v0.1.0 → 0.1.0) y el
      # versionCode del número de ejecución del workflow (entero siempre
      # creciente, requisito de Google Play). No hay que tocar pubspec.yaml.
      - name: Derivar versión del tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Firma ──────────────────────────────────────────────────────────────
      # Requiere 4 GitHub Secrets (ver docs/arquitectura/ci-cd-y-firmas.md):
      #   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      #   ANDROID_KEYSTORE_KEY_ALIAS, ANDROID_KEYSTORE_KEY_PASSWORD
      #
      # Si los secrets aún no están configurados el step fallará con un error
      # claro. Mientras tanto, comenta el bloque de firma y usa --release sin
      # signing (el APK funcionará para pruebas pero no para Play Store).
      - name: Decodificar keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > $HOME/upload-keystore.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          storeFile=$HOME/upload-keystore.jks
          EOF
      # ───────────────────────────────────────────────────────────────────────

      - name: Build APK firmado
        run: flutter build apk --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ github.run_number }}

      - name: Build App Bundle firmado (Play Store)
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ github.run_number }}

      - name: Subir artefactos a la Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  ios:
    # iOS sin firma: valida que el código compila.
    # Para distribuir en App Store se necesita cuenta Apple Developer (US$99/año)
    # y configurar los secrets IOS_CERT_P12_BASE64, APP_STORE_CONNECT_*.
    # Ver: docs/arquitectura/ci-cd-y-firmas.md sección 6.
    name: Build iOS (sin codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Derivar versión del tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build iOS (sin codesign)
        run: flutter build ios --release --no-codesign --build-name=${{ steps.version.outputs.name }} --build-number=${{ github.run_number }}

      - name: Comprimir build iOS
        run: |
          cd build/ios/iphoneos
          zip -r ../../../blackjack-ios-unsigned.zip Runner.app

      - name: Subir build iOS a la Release
        uses: softprops/action-gh-release@v2
        with:
          files: blackjack-ios-unsigned.zip
