name: Build Artifacts
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar firebase-tools
        run: npm install -g firebase-tools@13

      - name: Distribuir APK debug a App Distribution
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-debug.apk \
            --app 1:822375769128:android:adc9972274f9770c92011d \
            --groups "testers-internos" \
            --release-notes "debug/${BRANCH} · ${COMMIT_SHA:0:7}" \
            --project blackjack-21-app

  windows:
    name: Build Windows (release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Comprimir build Windows
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath blackjack-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: blackjack-windows.zip
          retention-days: 30
