name: Build Artifacts
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Build APK debug (artefacto de CI)
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # El APK distribuido a testers debe estar firmado con el keystore de
      # release (SHA-1 registrado en Firebase Console). El APK debug usa el
      # keystore temporal del runner de CI —SHA-1 diferente en cada ejecución—
      # y Google rechaza el Sign-In con ApiException: 10 (DEVELOPER_ERROR).
      - name: Decodificar keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > $HOME/upload-keystore.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          storeFile=$HOME/upload-keystore.jks
          EOF

      - name: Build APK firmado (App Distribution)
        run: flutter build apk --release

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar firebase-tools
        run: npm install -g firebase-tools@13

      - name: Distribuir APK firmado a App Distribution
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app 1:822375769128:android:adc9972274f9770c92011d \
            --groups "testers-internos" \
            --release-notes "${BRANCH} · ${COMMIT_SHA:0:7}" \
            --project blackjack-21-app

  windows:
    name: Build Windows (release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Comprimir build Windows
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath blackjack-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: blackjack-windows.zip
          retention-days: 30
