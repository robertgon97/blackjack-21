name: Deploy Firebase

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-firestore:
    name: Reglas e índices de Firestore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar firebase-tools
        run: npm install -g firebase-tools@13

      - name: Deploy Firestore (reglas + índices)
        run: firebase deploy --only firestore:rules,firestore:indexes --project blackjack-21-app

  deploy-functions:
    name: Cloud Functions (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias de Functions
        run: npm ci --prefix functions

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar firebase-tools
        run: npm install -g firebase-tools@13

      - name: Deploy Functions
        run: firebase deploy --only functions --project blackjack-21-app

  deploy-hosting:
    name: Hosting (Flutter web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar firebase-tools
        run: npm install -g firebase-tools@13

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project blackjack-21-app
