name: Tests

# Corre los tests en cada push y cada pull request hacia main.
# Si los tests fallan, el commit/PR queda marcado en rojo en GitHub.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verificar sintaxis de los módulos
        run: |
          for f in js/*.js; do node --check "$f"; done

      - name: Correr los tests
        run: node tests/test.js
