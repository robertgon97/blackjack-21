name: Desplegar en GitHub Pages

# Compila el CSS con Tailwind y publica el sitio en cada push a main.
# IMPORTANTE: requiere que en el repo Settings → Pages → Source esté en
# "GitHub Actions" (en vez de "Deploy from a branch").
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar CSS (Tailwind, minificado)
        run: npm run build:css:min

      - name: Preparar el sitio (solo lo que se sirve)
        run: |
          mkdir -p _site
          cp index.html styles.css favicon.svg og-image.png _site/
          cp -r js _site/

      - name: Subir el sitio como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
