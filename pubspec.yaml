name: blackjack_21
description: "Blackjack 21 — app multiplataforma (Android, Web, Windows, iOS)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

# NOTA: dependencias añadidas por fase para evitar fijar versiones que queden
# obsoletas. Fase 1 (lógica pura + tests) solo necesita el SDK de Flutter.
# Las siguientes se agregarán al llegar a su fase:
#   - go_router                             (Fase 2+: navegación y deep links)
#   - firebase_core, firebase_auth,
#     cloud_firestore, cloud_functions     (Fase 3+: backend)
#   - livekit_client                        (Fase 6: voz/cámara)
#   - google_mobile_ads, firebase_messaging (Fase 7: monetización/push)
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Fase 2: gestión de estado (UI ↔ lógica de dominio). Se usa con un Notifier
  # escrito a mano (sin codegen) para no depender de build_runner.
  flutter_riverpod: ^2.5.1
  # Fase 3: Firebase (core + auth + firestore)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  go_router: ^14.3.0
  # Fase 4: llamadas a Cloud Functions (transferCredits)
  cloud_functions: ^5.1.0
  # Fase 6: observabilidad (Crashlytics en Android/iOS; Analytics en Android/iOS/Web)
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
